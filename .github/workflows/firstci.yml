name: My first Workflow
on: 
  push:
    branches:
      - master
jobs:
  build-and-push:
    runs-on:
      ubuntu-latest
    defaults:
      run:
        working-directory: ./taskapi
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
        
      - name: Install Dependencies
        run: npm install

      - name: Get Version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./taskapi
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ steps.version.outputs.VERSION }}
            ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:cache
          cache-to: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:cache,mode=max
 
      - name: Logout from Docker
        if: always()
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: docker logout $REGISTRY